# ============================================================
# Analysis Profile: AF BFC Scan
# ============================================================
# 대상 로그: AF_DEBUG 태그의 BFC 스캔 데이터
# 예시 메시지:
#   CheckDebugMode(4499) : [cam_id_0] BFC scanning 1 | Dof 64 | CurrLens 1726, 178 mm |
#   pdResult 0.0938 | aiResult -1.3683, 1 | pdAvg 0.0891 | aiAvg -1.5747
# ============================================================

name: AF BFC Scan

# ----------------------------------------------------------
# filter: 이 프로파일을 적용할 로그 라인 조건
#   tag     - logcat 태그 (정확히 일치)
#   keyword - 메시지에 포함되어야 할 키워드
# ----------------------------------------------------------
filter:
  tag: AF_DEBUG
  keyword: "BFC scaning"

# ----------------------------------------------------------
# patterns: 메시지 파싱 규칙 목록 (순서대로 적용)
#
# type: segment
#   delimiter  - 세그먼트 구분자
#   strip      - 세그먼트 양끝 공백 제거 여부
#   inner_type - 세그먼트 내부 파싱 방식 (key_value / regex)
#   separator  - key와 value 사이 구분자
#   keys       - 추출할 키 목록 (목록에 없는 키는 무시)
#
# type: regex
#   pattern - Python 정규식 (named group (?P<key>...) 으로 키 이름 지정)
#   예시: "CurrLens\\s+(?P<CurrLens_code>\\d+),\\s*(?P<CurrLens_mm>\\d+)\\s*mm"
#         → CurrLens_code = 1726, CurrLens_mm = 178
# ----------------------------------------------------------
patterns:
  - type: segment
    params:
      delimiter: "|"
      strip: true
      inner_type: key_value
      separator: " "
      keys:
        - Dof
        - step
        - point
        - currDof
        - pdResult
        - aiResult
        - pdAvg
        - aiAvg

  # CurrLens는 두 값(code, mm)을 분리 추출
  - type: regex
    params:
      pattern: "CurrLens\\s+(?P<CurrLens_code>\\d+),\\s*(?P<CurrLens_mm>\\d+)\\s*mm"

# ----------------------------------------------------------
# visualization: 그래프 레이아웃 및 플롯 정의
#   layout - "grid" (여러 그래프) | "single" (하나의 그래프)
#   plots  - 플롯 목록
#     title   - 그래프 제목
#     keys    - y축에 표시할 데이터 키 목록
#     y_label - y축 레이블
# ----------------------------------------------------------
visualization:
  layout: grid
  plots:
    - title: Lens Position (code)
      keys: [CurrLens_code]
      y_label: code

    - title: Lens Position (mm)
      keys: [CurrLens_mm]
      y_label: mm

    - title: PD-AIAF Result Compare
      keys: [currDof, pdResult, pdAvg]
      y_label: DoF

    - title: PD-AIAF Average Compare
      keys: [currDof, aiResult, aiAvg]
      y_label: DoF
